name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 libgtk-3-0 libnss3 libxss1 libasound2t64 libgbm1 xdg-utils

      - name: Install dependencies
        run: npm ci

      - name: Build AppImage
        run: npm run dist

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/Tileboard-*.AppImage
          generate_release_notes: true
